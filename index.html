<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Support Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      height: 90vh;
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bot-avatar {
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .chat-header h2 { font-size: 17px; font-weight: 600; }
    .chat-header p  { font-size: 12px; opacity: 0.85; margin-top: 2px; }

    .status-dot {
      width: 8px; height: 8px;
      background: #4cff72;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message { display: flex; align-items: flex-end; gap: 8px; }
    .message.user { flex-direction: row-reverse; }

    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
    }

    .bot .bubble {
      background: #f1f3f4;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .user .bubble {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .bot .avatar  { background: #e8f0fe; }
    .user .avatar { background: #1a73e8; color: white; }

    .intent-tag {
      font-size: 11px;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 12px;
      padding: 2px 8px;
      margin-top: 5px;
      display: inline-block;
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: #f1f3f4;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 7px; height: 7px;
      background: #888;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    .chat-input {
      padding: 14px 15px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
      background: white;
    }

    .chat-input input {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    .chat-input input:focus { border-color: #1a73e8; }

    .chat-input button {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }

    .chat-input button:hover   { transform: scale(1.08); }
    .chat-input button:active  { transform: scale(0.95); }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 0 15px 12px;
    }

    .quick-btn {
      background: #f0f4ff;
      border: 1.5px solid #c5d4ff;
      color: #1a73e8;
      border-radius: 20px;
      padding: 6px 13px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-btn:hover {
      background: #1a73e8;
      color: white;
      border-color: #1a73e8;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <!-- Header -->
  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div>
      <h2>Support Assistant</h2>
      <p><span class="status-dot"></span>Online — NLP Powered</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chatMessages">
    <div class="message bot">
      <div class="avatar">🤖</div>
      <div>
        <div class="bubble">
          👋 Hello! I'm your AI Support Assistant. I can help you with:<br><br>
          🛒 Order Status &nbsp;|&nbsp; 💰 Billing &nbsp;|&nbsp; 🔄 Refunds<br>
          🔧 Technical Issues &nbsp;|&nbsp; 📦 Shipping
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Replies -->
  <div class="quick-replies">
    <button class="quick-btn" onclick="sendQuick('Where is my order?')">📦 Order Status</button>
    <button class="quick-btn" onclick="sendQuick('I want a refund')">🔄 Refund</button>
    <button class="quick-btn" onclick="sendQuick('I have a billing issue')">💳 Billing</button>
    <button class="quick-btn" onclick="sendQuick('App not working')">🔧 Tech Support</button>
    <button class="quick-btn" onclick="sendQuick('Shipping information')">🚚 Shipping</button>
  </div>

  <!-- Input -->
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type your message..." 
           onkeypress="handleKey(event)" autocomplete="off"/>
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const messagesDiv = document.getElementById("chatMessages");
  const inputField  = document.getElementById("userInput");

  function scrollToBottom() {
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function addMessage(text, sender, intent = null, confidence = null) {
    const div = document.createElement("div");
    div.className = `message ${sender}`;

    const avatar = sender === "bot" ? "🤖" : "👤";

    let extra = "";
    if (sender === "bot" && intent && intent !== "unknown") {
      extra = `<div class="intent-tag">🏷️ ${intent} (${(confidence * 100).toFixed(0)}%)</div>`;
    }

    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div>
        <div class="bubble">${text}</div>
        ${extra}
      </div>`;

    messagesDiv.appendChild(div);
    scrollToBottom();
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "message bot";
    div.id = "typingIndicator";
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="typing">
        <span></span><span></span><span></span>
      </div>`;
    messagesDiv.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    const t = document.getElementById("typingIndicator");
    if (t) t.remove();
  }

  async function sendMessage() {
    const msg = inputField.value.trim();
    if (!msg) return;

    inputField.value = "";
    addMessage(msg, "user");
    showTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        addMessage("⚠️ " + data.error, "bot");
      } else {
        addMessage(data.response, "bot", data.intent, data.confidence);
      }
    } catch (err) {
      removeTyping();
      addMessage("⚠️ Connection error. Please try again.", "bot");
    }
  }

  function sendQuick(text) {
    inputField.value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === "Enter") sendMessage();
  }
</script>
</body>
</html>
